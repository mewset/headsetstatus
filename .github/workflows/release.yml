name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake qt6-base-dev libgl-dev libdbus-1-dev upx

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build binary
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Update PKGBUILD sha256sum
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          TARBALL_URL="https://github.com/${{ github.repository }}/archive/refs/tags/v${VERSION}.tar.gz"
          curl -fsSL "$TARBALL_URL" -o "headsetstatus-${VERSION}.tar.gz"
          SHA256=$(sha256sum "headsetstatus-${VERSION}.tar.gz" | cut -d' ' -f1)
          sed -i "s/sha256sums=('[^']*')/sha256sums=('${SHA256}')/" PKGBUILD
          echo "Updated sha256sum to: $SHA256"

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md | sed '/^[[:space:]]*$/d' | head -50)
          {
            echo "NOTES<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "${{ steps.changelog.outputs.NOTES }}" \
            build/HeadsetStatus \
            PKGBUILD
        env:
          GH_TOKEN: ${{ github.token }}
